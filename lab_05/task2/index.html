<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 05 Modular App</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .spacer { height: 100vh; background: #f0f0f0; margin: 20px 0; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <h1>Loading...</h1>
    
    <div>
        <input type="text" id="todo-input" placeholder="New Task">
        <button id="add-btn">Add</button>
        <button id="clear-btn" style="background: red; color: white;">Clear All (Dynamic Load)</button>
    </div>

    <ul id="todo-list"></ul>

    <div class="spacer">Scroll down to load footer...</div>

    <div id="footer-placeholder"></div>

    <script type="module" src="./modules/app.mjs"></script>
</body>
</html>
